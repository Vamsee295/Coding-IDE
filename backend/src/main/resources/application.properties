# Application Configuration
spring.application.name=StackFlow-IDE Backend

# Server Configuration
server.port=8081
server.servlet.context-path=/api

# Database Configuration — H2 in-memory (no file locking, auto-creates on startup)
spring.datasource.url=jdbc:h2:mem:stackflow;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (browse at http://localhost:8081/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

